<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {% for field in form %}
    <div class="mb-3">
        {{ field.label_tag }}

        {{ field }}

        {% if field.errors %}
        <div class="invalid-feedback d-block">
            {{ field.errors }}
        </div>
        {% endif %}
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-primary mt-3">
        {{ submit_button_text|default:"Save" }}
    </button>
</form>
